<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>

    <form method="POST">
        <input type="number" name="weight" placeholder="Enter weight (kg)" step="1" required>
        <input type="number" name="height" placeholder="Enter height (meters)" step="0.01" required>
        <button type="submit">Calculate BMI</button>
    </form>

        {% if bmi %}
    <div class="result-box">
        <p><strong>BMI:</strong> {{ bmi }}</p>
        <p><strong>Category:</strong> {{ category }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
